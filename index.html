<style>

body{
    background:black;
    color:white;
    font-family:Arial, sans-serif;

.container{
    max-width:900px;
    margin:auto;
    border:4px solid red;
    border-radius:20px;
    padding:30px;
    text-align:center;
    animation:rgbborder 3s linear infinite;

@keyframes rgbborder{

    0%{

        box-shadow:0 0 20px red;
    }

    25%{
        border-color:lime;
        box-shadow:0 0 20px lime;
    }

    50%{
        border-color:blue;
        box-shadow:0 0 20px blue;
    }

    75%{
        border-color:yellow;
        box-shadow:0 0 20px yellow;
    }

    100%{
        border-color:red;
        box-shadow:0 0 20px red;
    }

}

h1{
    color:#00AAFF;
    font-size:42px;
}

h2{
    color:white;
    margin-top:50px;
    font-size:30px;
}

p{
    font-size:22px;
    line-height:1.8;
}

.button{
    display:inline-block;
    margin-top:15px;
    padding:15px 35px;
    color:white;
    text-decoration:none;
    border:3px solid white;
    border-radius:15px;
    font-size:24px;
}

.button:hover{
    box-shadow:0 0 20px cyan;
}

</style>
</head>
